<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>poli ✟</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
:root{
  --c-bg:#0a050a;
  --c-blood:#e51e3a;
  --c-blood-soft:#a01828;
  --c-bone:#f5ede4;
  --c-mute:rgba(245,237,228,.6);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--c-bg);color:var(--c-bone);font-family:'JetBrains Mono',monospace;overflow:hidden;}
a,button{cursor:pointer;}

/* splash */
.splash{position:fixed;inset:0;z-index:1000;background:#000;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;cursor:pointer;transition:opacity .9s ease, visibility .9s;}
.splash.gone{opacity:0;visibility:hidden;}
.splash h2{font-family:'Cinzel Decorative',serif;font-weight:900;font-size:clamp(2rem,5vw,3.4rem);
  letter-spacing:10px;color:var(--c-bone);text-shadow:0 0 18px var(--c-blood-soft);
  animation:breathe 3s ease-in-out infinite;}
.splash p{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:6px;color:var(--c-mute);text-transform:uppercase;
  animation:pulse 2s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:.85;}50%{opacity:1;text-shadow:0 0 28px var(--c-blood);}}
@keyframes pulse{0%,100%{opacity:.3;}50%{opacity:.9;}}

/* bg layers */
.bg-stack{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-gif{position:absolute;inset:-4%;background:url('assets/bg2.gif') center/cover no-repeat;
  filter:blur(2px) brightness(.7) saturate(1.1) contrast(1.05);
  transform:scale(1.06);}
.bg-tint{position:absolute;inset:0;background:
  radial-gradient(ellipse at 50% 40%,rgba(229,30,58,.22),transparent 60%),
  radial-gradient(ellipse at center,transparent 35%,rgba(10,5,10,.75) 95%),
  linear-gradient(180deg,rgba(10,5,10,.3) 0%,rgba(10,5,10,.55) 100%);}
.noise{position:absolute;inset:0;opacity:.07;mix-blend-mode:overlay;pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.5'/></svg>");}
.vignette{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,.85) 100%);}

/* main */
.stage{position:relative;z-index:5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;perspective:1400px;}
.card{
  position:relative;width:min(420px,93vw);
  background:rgba(18,8,16,.6);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  border:1px solid rgba(245,237,228,.09);
  border-radius:20px;
  padding:36px 28px 24px;
  text-align:center;
  box-shadow:
    0 0 0 1px rgba(229,30,58,.12) inset,
    0 30px 80px rgba(0,0,0,.7),
    0 0 80px rgba(229,30,58,.18);
  transform-style:preserve-3d;
  transition:transform .3s cubic-bezier(.2,.8,.2,1);
}

/* avatar */
.av-wrap{position:relative;width:112px;height:112px;margin:0 auto 14px;}
.av-ring{position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(200,16,41,.35);
  animation:slowSpin 18s linear infinite;}
.av-ring::after{content:"";position:absolute;top:-3px;left:50%;width:5px;height:5px;border-radius:50%;background:var(--c-blood);
  box-shadow:0 0 8px var(--c-blood);transform:translateX(-50%);}
@keyframes slowSpin{to{transform:rotate(360deg);}}
.avatar{position:absolute;inset:0;border-radius:50%;overflow:hidden;
  border:1px solid rgba(236,228,220,.1);
  box-shadow:0 0 24px rgba(200,16,41,.3), inset 0 0 16px rgba(0,0,0,.6);
  background:#0a0008;}
.avatar img{width:100%;height:100%;object-fit:cover;filter:saturate(.85) contrast(1.1) brightness(.9);}
.av-status{position:absolute;bottom:2px;right:2px;width:14px;height:14px;border-radius:50%;
  background:var(--c-blood);border:2px solid #0a0008;box-shadow:0 0 6px var(--c-blood);
  animation:beat 1.6s ease-in-out infinite;}
@keyframes beat{0%,100%{transform:scale(1);}40%{transform:scale(1.2);}}

/* name */
.name-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:4px;}
.name{font-family:'Cinzel Decorative',serif;font-weight:900;font-size:2.4rem;letter-spacing:5px;
  color:var(--c-bone);text-shadow:0 0 24px rgba(229,30,58,.55);}
.badge{display:inline-flex;align-items:center;padding:3px 8px;font-size:.6rem;
  background:rgba(229,30,58,.15);border:1px solid rgba(229,30,58,.5);
  border-radius:6px;letter-spacing:2px;font-weight:700;color:var(--c-blood);
  text-transform:uppercase;font-family:'Orbitron',sans-serif;}
.handle{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:5px;color:var(--c-mute);
  text-transform:uppercase;margin-top:6px;}
.handle b{color:var(--c-blood);font-weight:400;}

/* bio */
.bio{margin:14px 0 16px;font-size:.82rem;line-height:1.65;color:rgba(245,237,228,.78);letter-spacing:.4px;}
.bio em{color:var(--c-blood);font-style:normal;text-shadow:0 0 8px rgba(229,30,58,.4);}

/* stats */
.stats{display:flex;justify-content:center;gap:22px;margin-bottom:18px;font-family:'Orbitron',sans-serif;}
.stat .v{font-size:1rem;font-weight:700;color:#fff;}
.stat .l{font-size:.55rem;letter-spacing:3px;color:var(--c-mute);text-transform:uppercase;margin-top:2px;}

/* divider */
.div{height:1px;background:linear-gradient(90deg,transparent,rgba(200,16,41,.25),transparent);margin:0 0 18px;}

/* socials */
.socials{display:flex;justify-content:center;gap:8px;margin-bottom:14px;}
.s-icon{display:flex;align-items:center;justify-content:center;width:36px;height:36px;
  background:rgba(255,255,255,.02);border:1px solid rgba(236,228,220,.07);border-radius:10px;
  color:var(--c-mute);text-decoration:none;transition:all .25s;cursor:pointer;}
.s-icon svg{width:14px;height:14px;fill:currentColor;transition:transform .25s;}
.s-icon:hover{color:var(--c-bone);border-color:rgba(200,16,41,.5);background:rgba(200,16,41,.08);
  box-shadow:0 4px 14px rgba(200,16,41,.25);}
.s-icon:hover svg{transform:scale(1.15);}

/* primary links */
.links{display:flex;flex-direction:column;gap:7px;}
.link{display:flex;align-items:center;gap:11px;padding:11px 14px;
  background:rgba(255,255,255,.015);border:1px solid rgba(236,228,220,.06);border-radius:10px;
  color:var(--c-bone);text-decoration:none;font-size:.78rem;letter-spacing:.6px;
  transition:all .25s;position:relative;overflow:hidden;cursor:pointer;}
.link::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(200,16,41,.12),transparent);
  transform:translateX(-100%);transition:transform .7s;}
.link:hover::before{transform:translateX(100%);}
.link:hover{border-color:rgba(200,16,41,.35);background:rgba(200,16,41,.05);}
.link svg{width:14px;height:14px;flex-shrink:0;fill:var(--c-mute);}
.link:hover svg:first-child{fill:var(--c-blood);}
.link span{flex:1;text-align:left;color:rgba(236,228,220,.8);}
.link .arrow{opacity:.3;transition:all .25s;width:12px;height:12px;}
.link:hover .arrow{opacity:.9;transform:translateX(3px);}

/* footer */
.foot{margin-top:18px;font-size:.55rem;letter-spacing:4px;color:rgba(236,228,220,.25);text-transform:uppercase;font-family:'Orbitron',sans-serif;}

/* audio mini */
.player{position:fixed;bottom:16px;left:16px;z-index:50;
  background:rgba(8,3,8,.7);backdrop-filter:blur(14px);
  border:1px solid rgba(236,228,220,.08);border-radius:10px;padding:7px 10px;
  display:flex;align-items:center;gap:9px;font-family:'Orbitron',sans-serif;}
.player .pp{width:26px;height:26px;border-radius:50%;background:var(--c-blood);
  border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;}
.player .pp:hover{transform:scale(1.08);}
.player .pp svg{width:11px;height:11px;fill:#fff;}
.player .t{font-size:.6rem;color:rgba(236,228,220,.7);letter-spacing:1.5px;text-transform:uppercase;}
.player .vol{width:50px;accent-color:var(--c-blood);cursor:pointer;}

/* bg switcher */
.bg-toggle{position:fixed;bottom:16px;right:16px;z-index:50;display:flex;gap:4px;
  background:rgba(8,3,8,.7);backdrop-filter:blur(14px);
  border:1px solid rgba(236,228,220,.08);border-radius:10px;padding:5px;}
.bg-toggle button{width:22px;height:22px;border-radius:5px;border:1px solid rgba(236,228,220,.08);
  background:transparent;color:var(--c-mute);cursor:pointer;
  font-family:'Orbitron',sans-serif;font-size:.55rem;font-weight:700;transition:all .2s;}
.bg-toggle button.on,.bg-toggle button:hover{background:var(--c-blood);color:#fff;border-color:transparent;}

/* mobile */
@media (max-width:520px){
  .name{font-size:1.8rem;letter-spacing:4px;}
  .player{bottom:10px;}
}
</style>
</head>

<script>
const splash=document.getElementById('splash'),bgm=document.getElementById('bgm');
splash.addEventListener('click',()=>{splash.classList.add('gone');bgm.volume=.35;bgm.play().catch(()=>{});
  document.getElementById('ppIcon').innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';});

const card=document.getElementById('card'),stage=document.getElementById('stage');
stage.addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect(),cxx=r.left+r.width/2,cyy=r.top+r.height/2;
  const rx=((e.clientY-cyy)/r.height)*-5,ry=((e.clientX-cxx)/r.width)*5;
  card.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`;
});
stage.addEventListener('mouseleave',()=>card.style.transform='');

const bgGif=document.getElementById('bgGif');
document.querySelectorAll('.bg-toggle button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.bg-toggle button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    bgGif.style.backgroundImage=`url('${b.dataset.bg}')`;
  });
});

const pp=document.getElementById('pp'),ppIcon=document.getElementById('ppIcon'),vol=document.getElementById('vol');
pp.addEventListener('click',()=>{
  if(bgm.paused){bgm.play();ppIcon.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';}
  else{bgm.pause();ppIcon.innerHTML='<path d="M8 5v14l11-7z"/>';}
});
vol.addEventListener('input',()=>bgm.volume=vol.value/100);

let vv=13666;setInterval(()=>{vv+=Math.floor(Math.random()*3);
  const el=document.getElementById('vc');if(el)el.textContent=(vv/1000).toFixed(1)+'K';},5000);
</script>
</body>
</html>
